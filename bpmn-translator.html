    <style>
        .iframe-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px 10px;
            background: transparent;
        }

        .iframe-container {
            width: 100%;
            max-width: 650px; /* Snug fit to remove excess white borders */
            height: 655px;
            border: none;
            border-radius: 12px;
            background: transparent;
            box-shadow: none; /* Removed box shadow to allow seamless transparency */
            transition: filter 0.8s ease;
        }

        /* Smart visual inversion to simulate native Dark Mode on the cross-origin iframe! */
        body.dark-theme .iframe-container {
            filter: invert(0.92) hue-rotate(180deg) brightness(1.05); /* Invert white to dark slate, preserve red/orange UI hues */
