<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CORE Commissioning AI Agent">
    <title>CORE Cx AI Agent | Neil Sayco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .split-screen {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            min-height: 75vh;
            align-items: center; /* Enforces vertical centering cross-panel */
        }

        .split-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        @media (max-width: 900px) {
            .split-screen {
                flex-direction: column;
            }
            .split-panel {
                min-height: 60vh;
            }
        }

        .iframe-container,
        .chat-container {
            width: 100%;
            max-width: 650px;
            height: 655px; /* Restrict pixel height tightly so Form removes whitespace and centers visually */
            border: none;
            border-radius: 16px;
            background: transparent; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            transition: filter 0.8s ease, background 0.5s ease;
        }

        .iframe-container { background: #ffffff; }

        .chat-container {
            color-scheme: light !important; /* Force native default rendering to explicitly ignore OS dark mode */
        }

        /* Seamlessly flip BOTH containers reliably when the website is toggled to Dark Theme */
        body.dark-theme .iframe-container,
        body.dark-theme .chat-container {
            filter: invert(0.92) hue-rotate(180deg) brightness(1.05); 
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo" style="text-decoration: none;">NS.</a>
            <div class="nav-links">
                <a href="index.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">← Back to Home</a>
            </div>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </nav>

    <main class="container">
        <section class="glass-panel text-center reveal" style="margin-top: 60px;">
            <h1 class="hero-title" style="font-size: 3rem; margin-bottom: 20px;">Simple <span class="gradient-text">Retrieval-Augmented Generation</span> (RAG) Agent</h1>
            <p class="hero-tagline">Upload documents on the left to contextualize your AI queries on the right.</p>
        </section>

        <section class="reveal split-screen" style="padding: 40px 0; background: transparent;">
            <!-- Left: n8n Ingestion Form -->
            <div class="split-panel">
                <iframe class="iframe-container" src="https://n8n.srv1320209.hstgr.cloud/form/8905e6d1-7da2-4256-b249-f56b55aa8467" title="RAG Agent File Context" allowtransparency="true"></iframe>
            </div>
            
            <!-- Right: Chat Interface -->
            <div class="split-panel">
                <div id="n8n-chat" class="chat-container"></div>
            </div>
        </section>
    </main>

    <footer class="glass-panel text-center">
        <p>&copy; 2026 Neil Sayco. All rights reserved. | Bridging Engineering and Automation.</p>
    </footer>

    <script src="script.js"></script>
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://n8n.srv1320209.hstgr.cloud/webhook/e209eb72-633b-47cf-ab61-6b0a63a31b7f/chat',
            target: '#n8n-chat',
            mode: 'fullscreen',
            showWelcomeScreen: true,
            initialMessages: [
                'Hi! I am your AI Assistant. How can I help you today?'
            ],
            i18n: {
                en: {
                    title: 'Simple RAG AI Agent',
                    subtitle: '',
                    inputPlaceholder: 'Ask a technical question...',
                },
            },
            style: {
                /* Explicitly enforce extremely pure Light Theme defaults so our inversion matrix flips it beautifully */
                '--chat--color-primary': '#e63946',
                '--chat--light--primary-color': '#e63946',
                
                '--chat--color-background': '#ffffff',
                '--chat--light--color-background': '#ffffff',
                
                '--chat--color-font': '#000000',
                '--chat--light--color-font': '#000000',
                
                '--chat--header--background': '#ffffff',
                '--chat--light--header--background': '#ffffff',
                
                '--chat--header--color': '#000000',
                '--chat--light--header--color': '#000000',
                
                '--chat--message--bot--background': '#f0f0f0',
                '--chat--light--message--bot--background': '#f0f0f0',
                
                '--chat--message--bot--color': '#000000',
                '--chat--light--message--bot--color': '#000000',
                
                '--chat--message--user--background': '#e63946',
                '--chat--light--message--user--background': '#e63946',
                
                '--chat--message--user--color': '#ffffff',
                '--chat--light--message--user--color': '#ffffff',
            }
        });
    </script>
</body>
</html>
